[build]
builder = "DOCKERFILE"

[deploy]
startCommand = "sh -c 'uvicorn api.main:app --host 0.0.0.0 --port $PORT'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Persistent volume — all agent data (knowledge base, cookies, assignments,
# queue, crawl status) survives restarts and redeployments.
# After deploying, go to Railway dashboard -> your service -> Volumes
# and add a volume mounted at /data (1GB is plenty).
# Then add DATA_DIR=/data in your service Variables.
[[volumes]]
mountPath = "/data"
