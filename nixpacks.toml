[phases.setup]
nixPkgs = ["python311", "nodejs_20", "chromium", "nss", "nspr", "alsa-lib", "atk", "cups", "dbus", "expat", "libdrm", "libxkbcommon", "mesa", "libGL", "gtk3", "pango", "cairo", "gdk-pixbuf", "xorg.libX11", "xorg.libXcomposite", "xorg.libXdamage", "xorg.libXext", "xorg.libXfixes", "xorg.libXrandr", "xorg.libxcb"]

[phases.install]
cmds = ["python3 -m venv /opt/venv && /opt/venv/bin/pip install -r requirements.txt"]

[phases.build]
cmds = ["cd dashboard && npm install && npm run build && rm -rf /app/dashboard/build && cp -r build /app/dashboard/build"]

[start]
cmd = "PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH=$(which chromium) /opt/venv/bin/uvicorn api.main:app --host 0.0.0.0 --port $PORT"
